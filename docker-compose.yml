services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
    - POSTGRES_USER=${DB_USER}
    - POSTGRES_PASSWORD=${DB_PASSWORD}
    - POSTGRES_DB=${DB_NAME}
    ports:
    - "5432:5432"  
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build: ./ShoppingList.Server
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${BACKEND_CONNECTION_STRING}
      - AllowedOrigins=http://localhost:5000
    depends_on:
      db:
        condition: service_healthy

  frontend-ui:
    build: ./ShoppingList.Client
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - BACKEND_URL=http://backend-api:8080
    depends_on:
      - backend-api

volumes:
  postgres_data:
  